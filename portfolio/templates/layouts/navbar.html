<nav class="fixed top-0 left-0 w-full bg-stone-800 h-14 border-b border-stone-700">
    <div class="replative p-5 md:p-0 h-full max-w-screen-xl mx-auto flex items-center gap-5" x-data="{open: false}" @click.outside="open=false">
        <a class="font-bold text-stone-400 text-lg z-20" href="/">Dev Usman</a>

        <button class="ml-auto md:hidden z-20" @click="open=!open">
            <svg x-show="!open" class="w-6 h-6 text-stone-800 dark:text-stone-400" aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
            </svg>
            <svg x-show="open" class="w-6 h-6 text-zinc-800 dark:text-zinc-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24"
                height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M6 18 17.94 6M18 18 6.06 6" />
            </svg>
        </button>

        <ul :class="open ? '' : 'hidden'"
            class="ml-auto absolute top-full left-0 w-full bg-stone-800 p-5 md:bg-inherit md:p-0 md:static md:w-auto md:flex items-center gap-5">
            {% for page in ['About', 'projects', 'skills', 'blogs', 'contact'] %}
            <li><a href="#"
                    class="block rounded-lg px-3 py-2 capitalize hover:bg-stone-500 hover:text-stone-900 hover:font-bold">{{page}}</a>
            </li>
            {% endfor %}
            <li>
                <button class="btn-inline mt-2 ml-3 md:m-0 w-full">Resume</button>
            </li>
        </ul>
    </div>
</nav>
