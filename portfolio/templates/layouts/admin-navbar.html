<header class="flex sticky top-0 items-center gap-5 h-16 px-5 border-b border-stone-700 bg-stone-900">
    <p class="text-lg">Welcome, <span class="font-bold capitalize">{{current_user.username}}</span></p>

    <div class="ml-auto flex items-center gap-5">
        <button>
            <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 5.365V3m0 2.365a5.338 5.338 0 0 1 5.133 5.368v1.8c0 2.386 1.867 2.982 1.867 4.175 0 .593 0 1.292-.538 1.292H5.538C5 18 5 17.301 5 16.708c0-1.193 1.867-1.789 1.867-4.175v-1.8A5.338 5.338 0 0 1 12 5.365ZM8.733 18c.094.852.306 1.54.944 2.112a3.48 3.48 0 0 0 4.646 0c.638-.572 1.236-1.26 1.33-2.112h-6.92Z" />
            </svg>
        </button>

        <div class="relative" x-data="{open: false}">
            <button @click="open=true" class="w-10 h-10 bg-stone-700 flex items-center justify-center rounded-full">
                <svg class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                    width="24" height="24" fill="none" viewBox="0 0 24 24">
                    <path stroke="currentColor" stroke-width="2"
                        d="M7 17v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1a3 3 0 0 0-3-3h-4a3 3 0 0 0-3 3Zm8-9a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
            </button>

            <div x-show="open" @click.outside class="absolute top-full right-0 p-2 mt-1 rounded-lg border border-stone-700 bg-stone-800 min-w-40">
                <ul>
                    <li><a href="#"
                            class="block px-3 py-1.5 text-sm text-stone-400 rounded-lg hover:bg-stone-900">Dashboard</a>
                    </li>
                    <li><a href="#"
                            class="block px-3 py-1.5 text-sm text-stone-400 rounded-lg hover:bg-stone-900">Settings</a>
                    </li>
                    <li><a href="#"
                            class="block px-3 py-1.5 text-sm text-stone-400 rounded-lg hover:bg-stone-900">Profile</a>
                    </li>
                </ul>
            </div>
        </div>

        <button @click="open = !open" class="md:hidden">
            <svg x-show="!open" class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-width="2" d="M5 7h14M5 12h14M5 17h14" />
            </svg>
            <svg x-show="open" class="w-6 h-6 text-gray-800 dark:text-white" aria-hidden="true"
                xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M6 18 17.94 6M18 18 6.06 6" />
            </svg>
        </button>
    </div>
</header>
