{% extends 'base.html' %}

{% from 'parts/form.html' import input, submit %}

{% block content %}
<div class="py-10 px-5 md:px-0 max-w-sm mx-auto">

    <h1 class="text-2xl font-bold">Login</h1>

    <form action="" class="flex flex-col gap-3 mt-5" method="post">
        {{form.csrf_token}}
        {{input(form.username)}}
        {{input(form.password)}}
        {{submit('Login')}}
    </form>
</div>
{% endblock %}
